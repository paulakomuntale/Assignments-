<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        
        .welcome-container {
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        
        .welcome-container h1 {
            color: #333;
            font-size: 36px;
        }
        
        .welcome-container .username {
            color: #667eea;
            font-weight: bold;
        }
        
        .logout-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 30px;
            background: #ff6b6b;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .logout-btn:hover {
            background: #ee5a24;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>Welcome, <span class="username">{{ username }}</span>! 🎉</h1>
        <p>You have successfully logged in.</p>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>
</body>
</html>
